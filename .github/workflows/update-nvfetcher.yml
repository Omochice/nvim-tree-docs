name: Update nvfetcher sources

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch: null

jobs:
  list-packages:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: list
        run: |
          packages=$(grep '^\[' nvfetcher.toml | tr -d '[]' | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "packages=$packages" >> "$GITHUB_OUTPUT"

  update:
    timeout-minutes: 10
    needs: list-packages
    runs-on: ubuntu-latest
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.list-packages.outputs.packages) }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@7bd03711494f032dfa3be3558f7dc8787b0be333 # v3.1.0
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ steps.app-token.outputs.token }}
      - name: Run nvfetcher for ${{ matrix.package }}
        env:
          PACKAGE: ${{ matrix.package }}
        run: nix develop --command nvfetcher -k "$PACKAGE"
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: nvfetcher-update-${{ matrix.package }}
          commit-message: "chore(deps): update ${{ matrix.package }} via nvfetcher"
          title: "chore(deps): update ${{ matrix.package }} via nvfetcher"
          body: Automated update of `${{ matrix.package }}` by nvfetcher.
          sign-commits: true
          delete-branch: true
